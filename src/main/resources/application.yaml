# ========================================
# 기본 설정 (모든 환경 공통)
# ========================================
spring:
  application:
    name: globalnews

  # 데이터소스 기본값 (로컬 개발용)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/once_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # JPA 공통 설정
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
    open-in-view: false

  # Redis 공통 설정
  data:
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # AI/Bedrock 공통 설정
  ai:
    bedrock:
      anthropic:
        chat:
          enabled: true
          model: ${BEDROCK_MODEL_ID:global.anthropic.claude-sonnet-4-6}
          temperature: 0.7
      aws:
        region: ${AWS_REGION:ap-northeast-2}
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}

# ========================================
# 보안 설정
# ========================================
jwt:
  secret: ${JWT_SECRET}
  access-token-validity-in-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS:3600}
  refresh-token-validity-in-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS:2592000}

kakao:
  client_id: ${REST_API_KEY}
  redirect_uri: ${KAKAO_REDIRECT_URI}

# ========================================
# 비즈니스 설정
# ========================================
chat:
  rate-limit:
    daily-limit: ${CHAT_DAILY_LIMIT:100}
    reset-hours: 24
    ttl-seconds: 86400
  message-limit:
    max-messages-per-session: 200
    max-sessions-per-user: 100
    history-limit: 20
    max-message-length: 5000
  ai:
    response-timeout: 60
    max-tokens: 4000
    max-retries: 3
  attachment:
    per-message-max-count: 5
    upload-rate-limit-per-day: ${CHAT_UPLOAD_DAILY_LIMIT:50}
    max-image-base64-source-bytes: 3750000

storage:
  s3:
    bucket: ${CHAT_ATTACHMENTS_BUCKET:onec-chat-attachments-dev-apne2}
    region: ${AWS_REGION:ap-northeast-2}
    presign-ttl-seconds: 600
    max-object-size-bytes: 33554432
    allowed-image-mime-types: image/png,image/jpeg,image/webp,image/gif

# ========================================
# 모니터링
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
