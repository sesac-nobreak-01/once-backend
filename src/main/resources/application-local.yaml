# ========================================
# 로컬 개발 환경 전용 설정
# ========================================
spring:
  config:
    activate:
      on-profile: local

  # 로컬 PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/once_db
    username: postgres
    password: postgres

  # JPA 로컬 설정
  jpa:
    hibernate:
      ddl-auto: update  # 자동 스키마 업데이트
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    show-sql: true

  # 로컬 Redis
  data:
    redis:
      host: localhost
      port: 6379

  # Mock Bedrock (로컬 테스트용)
  ai:
    bedrock:
      mock:
#        enabled: false
        enabled: true
      aws:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      anthropic:
        chat:
          max-tokens: 2000

# 로깅 - 디버그 레벨
logging:
  level:
    root: INFO
    com.once.globalnews: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web.reactive.function.client: DEBUG

# 개발용 Actuator 전체 노출
management:
  endpoint:
    health:
      show-details: always