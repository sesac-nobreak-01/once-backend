name: Backend Prod Deploy

on:
  push:
    branches: [main]

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: once-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_tag=prod-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}

          docker buildx create --name builder --use || docker buildx use builder
          docker buildx build \
            --platform linux/amd64 \
            --no-cache \
            -t ${IMAGE_URI}:${{ steps.tags.outputs.image_tag }} \
            -t ${IMAGE_URI}:prod-latest \
            --push .

      - name: Print deployed image
        run: |
          echo "Deployed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.image_tag }}"

      - name: Update image tag in manifest repo
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
          MANIFEST_REPO_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${MANIFEST_REPO_TOKEN}@github.com/sesac-nobreak-02/once-backend-manifest-repo.git
          cd once-backend-manifest-repo
          sed -i "s|  tag: .*|  tag: \"${IMAGE_TAG}\"|" charts/backend/values.yaml
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add charts/backend/values.yaml
          git commit -m "ci: update image tag to ${IMAGE_TAG}"
          git push
